name: Deploy versioned documentation

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        required: true
        type: string
      tag:
        description: Release tag to deploy
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/python_build
        with:
          python-version: ${{ inputs.python-version }}
          tags: "[cicd,docs]"

      - name: Generate coverage report
        run: make coverage

      - name: Build docs
        run: make docs

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy versioned docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          destination_dir: ${{ inputs.tag }}
          keep_files: true

      - name: Deploy as latest
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          destination_dir: latest
          keep_files: true

      - name: Update switcher.json
        run: |
          python docs/_scripts/update_switcher.py \
            --version "${{ inputs.tag }}" \
            --switcher "gh-pages/latest/_static/switcher.json"
          cp gh-pages/latest/_static/switcher.json \
            gh-pages/${{ inputs.tag }}/_static/switcher.json

      - name: Commit updated switcher.json
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.tag }}/_static/switcher.json latest/_static/switcher.json
          if git diff --staged --quiet; then
            echo "No changes to switcher.json, skipping commit"
          else
            git commit -m "Update switcher.json for ${{ inputs.tag }}"
            git push
          fi
