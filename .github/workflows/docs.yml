name: Deploy versioned documentation

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        required: true
        type: string
      tag:
        description: Release tag to deploy
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/python_build
        with:
          python-version: ${{ inputs.python-version }}
          tags: "[cicd,docs]"

      - name: Generate coverage report
        run: make coverage

      - name: Build docs
        run: make docs

      - name: Update switcher.json
        run: |
          python docs/_scripts/update_switcher.py \
            --version "${{ inputs.tag }}" \
            --switcher "./docs/_build/html/_static/switcher.json"

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Commit updated switcher.json
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Copy built docs into versioned and latest directories
          rsync -a --delete ../docs/_build/html/ ./${{ inputs.tag }}/
          rsync -a --delete ../docs/_build/html/ ./latest/
          # Update switcher.json at the root of gh-pages
          cp "../docs/_build/html/_static/switcher.json" "./switcher.json"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy docs for ${{ inputs.tag }}"
            git push
          fi
